openapi: 3.1.0
info:
  title: RoseCloud IAM API
  version: 0.0.1
  description: Platform operator bootstrap/login, tenant invitations, tenant RBAC, and user session flows.
servers:
  - url: /api
paths:
  /operator/setup/begin:
    post:
      operationId: operatorSetupBegin
      summary: Begin platform operator setup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OperatorSetupBeginRequest"
      responses:
        "200":
          description: TOTP enrollment material
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperatorSetupBeginResponse"
  /operator/setup/complete:
    post:
      operationId: operatorSetupComplete
      summary: Complete platform operator setup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OperatorSetupCompleteRequest"
      responses:
        "204":
          description: Operator activated
  /operator/login:
    post:
      operationId: operatorLogin
      summary: Login as the platform operator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OperatorLoginRequest"
      responses:
        "200":
          description: Access token with refresh cookie
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Refresh token cookie named rc_refresh
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperatorLoginResponse"
  /sessions/login:
    post:
      operationId: userLogin
      summary: Login as an IAM user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserLoginRequest"
      responses:
        "200":
          description: User access token with refresh cookie
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Refresh token cookie named rc_refresh
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessTokenResponse"
        "401":
          description: Generic login rejection
  /sessions/refresh:
    post:
      operationId: userRefresh
      summary: Rotate the refresh cookie and mint a new user access token
      parameters:
        - in: cookie
          name: rc_refresh
          required: true
          schema:
            type: string
      responses:
        "200":
          description: New access token plus rotated refresh cookie
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Rotated refresh token cookie named rc_refresh
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessTokenResponse"
        "401":
          description: Refresh token invalid, expired, or family revoked
        "409":
          description: Previous refresh token reused within grace window; client should retry with the winning cookie
  /sessions/logout:
    post:
      operationId: userLogout
      summary: Revoke the current login session family
      parameters:
        - in: cookie
          name: rc_refresh
          required: false
          schema:
            type: string
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Session family revoked and refresh cookie cleared
        "401":
          description: Missing refresh cookie and bearer token
  /operator/tenants:
    post:
      operationId: createTenant
      summary: Create a pending tenant and owner invitation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantRequest"
      responses:
        "201":
          description: Pending tenant and owner invitation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTenantResponse"
        "401":
          description: Missing or invalid operator access token
  /invitations/accept/begin:
    post:
      operationId: invitationAcceptBegin
      summary: Begin owner invitation acceptance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvitationAcceptBeginRequest"
      responses:
        "200":
          description: TOTP enrollment material
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationAcceptBeginResponse"
        "400":
          description: Validation failed
        "401":
          description: Invitation cannot be accepted
  /invitations/accept/complete:
    post:
      operationId: invitationAcceptComplete
      summary: Complete new-user invitation acceptance after TOTP enrollment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvitationAcceptCompleteRequest"
      responses:
        "204":
          description: Invitation accepted and tenant activated
        "400":
          description: Validation failed
        "401":
          description: Invitation cannot be accepted or TOTP invalid
  /invitations/accept/join:
    post:
      operationId: invitationAcceptJoin
      summary: Accept an invitation for an existing ACTIVE user with password and TOTP proof
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvitationAcceptJoinRequest"
      responses:
        "204":
          description: Invitation accepted and membership created
        "400":
          description: Validation failed
        "401":
          description: Invitation cannot be accepted
  /me/memberships:
    get:
      operationId: listMyMemberships
      summary: List ACTIVE memberships for the authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Active memberships
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MembershipSummaryResponse"
        "401":
          description: Missing or invalid user access token
  /me/tenant-context:
    post:
      operationId: selectTenantContext
      summary: Mint a tenant-context access token from an ACTIVE membership
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantContextRequest"
      responses:
        "200":
          description: Tenant-context access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantContextResponse"
        "403":
          description: Membership or tenant is not ACTIVE
        "401":
          description: Missing or invalid user access token
  /tenants/{tenantId}/invitations:
    post:
      operationId: createMemberInvitation
      summary: Invite a tenant member as ADMIN or MEMBER
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: tenantId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemberInvitationRequest"
      responses:
        "201":
          description: Invitation created and outbox written
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateMemberInvitationResponse"
        "400":
          description: Validation failed or roleCode is not assignable
        "401":
          description: Missing or invalid bearer token
        "403":
          description: Tenant context missing, mismatched, or lacks tenant:invite
  /tenants/{tenantId}/users/{userId}/totp/reset:
    post:
      operationId: rejectTenantTotpReset
      summary: Reject tenant-context attempts to reset another user's global TOTP
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: tenantId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "403":
          description: Tenant context cannot reset global TOTP
        "401":
          description: Missing or invalid bearer token
  /demo/read:
    get:
      operationId: demoRead
      summary: Demo endpoint guarded by demo:read
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Permission granted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoPermissionResponse"
        "401":
          description: Missing or invalid bearer token
        "403":
          description: Missing demo:read
  /demo/admin:
    get:
      operationId: demoAdmin
      summary: Demo endpoint guarded by demo:admin
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Permission granted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoPermissionResponse"
        "401":
          description: Missing or invalid bearer token
        "403":
          description: Missing demo:admin
  /.well-known/jwks.json:
    get:
      operationId: jwks
      summary: JWKS for RS256 access token verification
      responses:
        "200":
          description: JWK Set
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      type: object
                required: [keys]
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    OperatorSetupBeginRequest:
      type: object
      properties:
        setupToken:
          type: string
        password:
          type: string
          minLength: 12
      required: [setupToken, password]
    OperatorSetupBeginResponse:
      type: object
      properties:
        totpSecret:
          type: string
        otpauthUrl:
          type: string
      required: [totpSecret, otpauthUrl]
    OperatorSetupCompleteRequest:
      type: object
      properties:
        setupToken:
          type: string
        totpCode:
          type: string
      required: [setupToken, totpCode]
    OperatorLoginRequest:
      type: object
      properties:
        password:
          type: string
        totpCode:
          type: string
      required: [password, totpCode]
    OperatorLoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
        expiresIn:
          type: integer
          format: int64
      required: [accessToken, tokenType, expiresIn]
    UserLoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        totpCode:
          type: string
          pattern: '^\d{6}$'
      required: [email, password, totpCode]
    AccessTokenResponse:
      type: object
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
        expiresIn:
          type: integer
          format: int64
      required: [accessToken, tokenType, expiresIn]
    CreateTenantRequest:
      type: object
      properties:
        name:
          type: string
        ownerEmail:
          type: string
          format: email
      required: [name, ownerEmail]
    CreateTenantResponse:
      type: object
      properties:
        tenantId:
          type: string
          format: uuid
        invitationId:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING]
      required: [tenantId, invitationId, status]
    CreateMemberInvitationRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        roleCode:
          type: string
          enum: [ADMIN, MEMBER]
      required: [email, roleCode]
    CreateMemberInvitationResponse:
      type: object
      properties:
        invitationId:
          type: string
          format: uuid
      required: [invitationId]
    InvitationAcceptBeginRequest:
      type: object
      properties:
        token:
          type: string
        password:
          type: string
          minLength: 12
      required: [token, password]
    InvitationAcceptBeginResponse:
      type: object
      properties:
        totpSecret:
          type: string
        otpauthUrl:
          type: string
      required: [totpSecret, otpauthUrl]
    InvitationAcceptCompleteRequest:
      type: object
      properties:
        token:
          type: string
        totpCode:
          type: string
          pattern: '^\d{6}$'
      required: [token, totpCode]
    InvitationAcceptJoinRequest:
      type: object
      properties:
        token:
          type: string
        password:
          type: string
          minLength: 12
        totpCode:
          type: string
          pattern: '^\d{6}$'
      required: [token, password, totpCode]
    MembershipSummaryResponse:
      type: object
      properties:
        membershipId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        tenantName:
          type: string
        roleCode:
          type: string
      required: [membershipId, tenantId, tenantName, roleCode]
    TenantContextRequest:
      type: object
      properties:
        membershipId:
          type: string
          format: uuid
      required: [membershipId]
    TenantContextResponse:
      type: object
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
        expiresIn:
          type: integer
          format: int64
        permissions:
          type: array
          items:
            type: string
      required: [accessToken, tokenType, expiresIn, permissions]
    DemoPermissionResponse:
      type: object
      properties:
        permission:
          type: string
      required: [permission]
