spring:
  application:
    name: rosecloud-iam
  jackson:
    time-zone: Asia/Shanghai
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Shanghai
  flyway:
    enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/rosecloud_iam
    username: rosecloud
    password: rosecloud

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: 8080
