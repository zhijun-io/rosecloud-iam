spring:
  application:
    name: rosecloud-iam
  jackson:
    time-zone: Asia/Shanghai
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Shanghai
  flyway:
    enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/rosecloud_iam
    username: rosecloud
    password: rosecloud

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: 8080

rosecloud:
  iam:
    refresh-reuse-grace: 5s
    refresh-token-ttl: 30d
    max-sessions-per-user: 10
    cookies:
      # Prefer Secure cookies. For plain-HTTP local browsers, override to false.
      secure: true
    crypto:
      totp-key-id: local
      totp-key: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
    jwt:
      access-token-ttl: 5m
    setup-token-ttl: 30m
    invitation-token-ttl: 7d
