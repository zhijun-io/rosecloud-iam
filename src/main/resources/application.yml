spring:
  application:
    name: rosecloud-iam
  jackson:
    time-zone: Asia/Shanghai
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Shanghai
  flyway:
    enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/rosecloud_iam
    username: rosecloud
    password: rosecloud
  mail:
    host: 127.0.0.1
    port: 1025
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: 8080

rosecloud:
  iam:
    refresh-reuse-grace: 5s
    refresh-token-ttl: 30d
    factor-challenge-ttl: 2m
    step-up-window: 5m
    max-sessions-per-user: 10
    login-rate-limit:
      # Progressive short cooldown by email + IP (never a permanent lock).
      max-failures-before-cooldown: 5
      initial-cooldown: 30s
      max-cooldown: 15m
    mail:
      # Local Mailpit: task up, then open http://127.0.0.1:8025/
      enabled: true
      from: noreply@rosecloud.local
      invite-base-url: http://127.0.0.1:5173/
    cookies:
      # Prefer Secure cookies. For plain-HTTP local browsers, override to false.
      secure: true
    crypto:
      totp-key-id: local
      totp-key: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
    jwt:
      access-token-ttl: 5m
    setup-token-ttl: 30m
    invitation-token-ttl: 7d
