version: "3"

vars:
  COMPOSE: docker compose

env:
  TZ: Asia/Shanghai
  JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Shanghai

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  up:
    desc: Start Postgres (Docker Compose)
    cmds:
      - "{{.COMPOSE}} up -d --wait"

  down:
    desc: Stop Compose services
    cmds:
      - "{{.COMPOSE}} down"

  logs:
    desc: Tail Compose logs
    cmds:
      - "{{.COMPOSE}} logs -f"

  ps:
    desc: Show Compose service status
    cmds:
      - "{{.COMPOSE}} ps"

  test:
    desc: Run backend tests
    cmds:
      - ./mvnw -B test

  frontend:install:
    desc: Install frontend dependencies
    dir: frontend
    cmds:
      - npm ci

  generate:
    desc: Generate TypeScript client from OpenAPI
    dir: frontend
    deps: [frontend:install]
    cmds:
      - npm run generate:api

  typecheck:
    desc: Generate API client, assert no OpenAPI drift, typecheck frontend
    dir: frontend
    deps: [frontend:install]
    cmds:
      - npm run generate:api
      - git ls-files --error-unmatch src/generated/openapi.ts
      - git diff --exit-code -- src/generated/openapi.ts
      - npm run typecheck

  operator:setup-token:
    desc: Issue Operator setup token (non-web; does not bind :8080)
    cmds:
      - ./mvnw -q -DskipTests spring-boot:run -Dspring-boot.run.main-class=io.rosecloud.iam.operator.OperatorSetupCli

  operator:mfa-reset:
    desc: Local CLI reset of Operator FactorBinding RecoveryCode
    cmds:
      - >-
        ./mvnw -q -DskipTests spring-boot:run
        -Dspring-boot.run.main-class=io.rosecloud.iam.operator.OperatorMfaResetCli
        -Dspring-boot.run.arguments="{{.OPERATOR_ID}} {{.REASON}}"

  run:
    desc: spring-boot:run (depends on up)
    deps: [up]
    cmds:
      - ./mvnw -DskipTests spring-boot:run

  frontend:dev:
    desc: Start Vite dev server with /api proxy
    dir: frontend
    deps: [frontend:install]
    cmds:
      - npm run dev

  prototype:factor-provider:
    desc: PROTOTYPE TUI — FactorProvider interface shape (throwaway)
    dir: src/prototype/factor-provider
    cmds:
      - rm -rf /tmp/rosecloud-iam-factor-provider-proto
      - mkdir -p /tmp/rosecloud-iam-factor-provider-proto
      - javac --release 25 -d /tmp/rosecloud-iam-factor-provider-proto *.java
      - java -cp /tmp/rosecloud-iam-factor-provider-proto io.rosecloud.iam.prototype.factor.FactorProviderTui

  ci:
    desc: Local CI gate — backend tests + frontend typecheck
    cmds:
      - task: test
      - task: typecheck
